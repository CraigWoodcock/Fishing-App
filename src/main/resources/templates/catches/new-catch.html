<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <meta content="ie=edge" http-equiv="X-UA-Compatible">
    <title>Log Catch - Fishing Session Tracker</title>
    <link rel="icon" th:href="@{/images/favicon-32.png}" type="image/png">
    <link href="@{/images/favicon-180.png}" rel="apple-touch-icon">
    <link rel="stylesheet" th:href="@{/css/output.css}">
</head>
<body class="bg-ink text-paper min-h-screen flex flex-col">

<div th:replace="~{fragments/layout :: header}"></div>

<main class="flex-grow container mx-auto px-4 py-6 sm:py-8 max-w-sm sm:max-w-lg">
    <h2 class="text-2xl sm:text-3xl font-bold mb-6 sm:mb-8">Log Catch — <span th:text="${sess.venue}"></span></h2>
    <div class="bg-red-500 text-paper p-3 rounded mb-4" role="alert" th:if="${error}">
        <p th:text="${error}"></p>
    </div>
    <form class="bg-surface p-6 sm:p-8 rounded-lg space-y-4" enctype="multipart/form-data" method="post"
          th:action="@{/sessions/{id}/catches(id=${sess.id})}">

        <div>
            <label class="block mb-1 text-sm sm:text-base" for="anglerId">Angler</label>
            <select class="w-full p-2 rounded bg-surface-alt text-paper" id="anglerId" name="anglerId" required>
                <option th:each="angler : ${anglers}" th:text="${angler.name}" th:value="${angler.id}"></option>
            </select>
        </div>

        <div>
            <label class="block mb-1 text-sm sm:text-base" for="catchTime">Catch Time</label>
            <input class="w-full p-2 rounded bg-surface-alt text-paper" id="catchTime" name="catchTime"
                   required th:min="${#temporals.format(sessionStartDateTime, 'yyyy-MM-dd''T''HH:mm')}"
                   th:value="${#temporals.format(sessionStartDateTime, 'yyyy-MM-dd''T''HH:mm')}"
                   type="datetime-local">
        </div>

        <div>
            <label class="block mb-1 text-sm sm:text-base" for="fishType">Fish Type</label>
            <input class="w-full p-2 rounded bg-surface-alt text-paper" id="fishType" name="fishType" required
                   type="text">
        </div>

        <div>
            <label class="block mb-1 text-sm sm:text-base" for="weight">Weight (lb.oz - e.g. 5.08 = 5lb 8oz)</label>
            <input class="w-full p-2 rounded bg-surface-alt text-paper" id="weight" name="weight" required
                   step="0.01" type="number">
        </div>

        <div>
            <label class="block mb-1 text-sm sm:text-base" for="pegOrSwim">Peg / Swim</label>
            <input class="w-full p-2 rounded bg-surface-alt text-paper" id="pegOrSwim" name="pegOrSwim" type="text">
        </div>

        <div>
            <label class="block mb-1 text-sm sm:text-base" for="notes">Notes</label>
            <textarea class="w-full p-2 rounded bg-surface-alt text-paper" id="notes" name="notes" rows="3"></textarea>
        </div>

        <div>
            <label class="block mb-1 text-sm sm:text-base" for="photo">Photo</label>
            <input accept="image/*" class="w-full text-paper text-sm" id="photo" name="photo" type="file">
        </div>

        <button class="bg-accent hover:bg-accent-hover text-paper font-bold py-2 px-4 rounded w-full" type="submit">
            Log Catch
        </button>
    </form>

    <a class="text-accent hover:text-accent-hover block mt-4" th:href="@{/sessions/{id}(id=${sess.id})}">
        Back to Session
    </a>
</main>

<div th:replace="~{fragments/layout :: footer}"></div>

</body>
</html>
