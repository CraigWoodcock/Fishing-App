<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <meta content="ie=edge" http-equiv="X-UA-Compatible">
    <title>Session - Fishing Session Tracker</title>
    <link rel="icon" th:href="@{/images/favicon-32.png}" type="image/png">
    <link href="@{/images/favicon-180.png}" rel="apple-touch-icon">
    <link rel="stylesheet" th:href="@{/css/output.css}">
</head>
<body class="bg-ink text-paper min-h-screen flex flex-col">

<div th:replace="~{fragments/layout :: header}"></div>

<main class="flex-grow container mx-auto px-4 py-6 sm:py-8 max-w-2xl">
    <h2 class="text-2xl sm:text-3xl font-bold mb-6 sm:mb-8">
        <span th:text="${sess.venue}"></span>
        <span class="text-faint font-normal" th:text="${#temporals.format(sess.startDate, 'dd-MM-yyyy')}"></span>
    </h2>

    <div class="bg-surface p-4 sm:p-6 rounded-lg mb-8">
        <p class="mb-2 text-sm sm:text-base"><strong>Duration:</strong>
            <span th:text="${sess.durationHours + ' hours'}"></span></p>
        <p class="mb-4 text-sm sm:text-base"><strong>Total Weight:</strong>
            <span th:text="${@sessionService.getTotalWeightForSession(sess.id)}"></span></p>

        <p class="mb-4 text-sm sm:text-base"><strong>Anglers:</strong></p>
        <ul class="list-disc pl-6 mb-4 text-sm sm:text-base">
            <li th:each="angler : ${@sessionService.getAnglersForSession(sess.id)}">
                <span th:text="${angler.name}"></span> —
                <span th:text="${@catchService.getTotalWeightForAnglerInSession(sess.id, angler.id)}"></span>
            </li>
        </ul>

        <div class="flex flex-col sm:flex-row gap-3">
            <a class="flex-1 text-center bg-accent hover:bg-accent-hover text-paper font-bold py-2 px-4 rounded"
               th:href="@{/sessions/{id}/catches/new(id=${sess.id})}">
                Add Catch
            </a>
            <a class="flex-1 text-center bg-surface-alt hover:bg-line text-paper font-bold py-2 px-4 rounded"
               href="/dashboard">
                Dashboard
            </a>
        </div>
    </div>

    <h3 class="text-xl sm:text-2xl font-bold mb-4">Catches</h3>

    <div class="bg-surface rounded-lg mb-8 divide-y divide-line" th:if="${not #lists.isEmpty(catches)}">
        <a class="flex items-center gap-4 p-3 sm:p-4 hover:bg-surface-alt"
           th:each="catchRecord : ${catches}"
           th:href="@{/sessions/{sessionId}/catches/{catchId}(sessionId=${sess.id},catchId=${catchRecord.id})}">
            <img alt="Catch thumbnail" class="w-14 h-14 sm:w-16 sm:h-16 object-cover rounded flex-shrink-0"
                 th:if="${catchRecord.photoUrl}"
                 th:src="${@s3Service.getPhotoUrl(catchRecord.photoUrl)}">
            <div class="w-14 h-14 sm:w-16 sm:h-16 bg-surface-alt rounded flex items-center justify-center text-xs text-faint flex-shrink-0"
                 th:unless="${catchRecord.photoUrl}">No photo
            </div>
            <div class="flex-1 min-w-0">
                <p class="font-bold truncate" th:text="${catchRecord.angler.name}"></p>
                <p class="text-sm text-faint truncate" th:text="${catchRecord.fishType}"></p>
            </div>
            <p class="font-bold flex-shrink-0" th:text="${@lbOzWeightConverter.format(catchRecord.weight)}"></p>
        </a>
    </div>

    <p class="text-faint mb-8" th:if="${#lists.isEmpty(catches)}">No catches logged yet.</p>

    <div class="border border-line rounded-lg p-4 sm:p-6">
        <p class="text-sm text-faint mb-3">
            Deleting a session permanently removes it and all of its logged catches. This cannot be undone.
        </p>
        <form method="post" onsubmit="return confirm('Are you sure you want to delete this session?');"
              th:action="@{/sessions/{id}/delete(id=${sess.id})}">
            <button class="text-sm text-faint border border-line hover:bg-danger hover:border-danger hover:text-paper font-bold py-2 px-4 rounded transition-colors"
                    type="submit">
                Delete Session
            </button>
        </form>
    </div>

</main>

<div th:replace="~{fragments/layout :: footer}"></div>

</body>
</html>
