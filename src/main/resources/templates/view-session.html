<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <meta content="ie=edge" http-equiv="X-UA-Compatible">
    <title>Session - Fishing Session Tracker</title>
    <link rel="icon" th:href="@{/images/favicon-32.png}" type="image/png">
    <link href="@{/images/favicon-180.png}" rel="apple-touch-icon">
    <link rel="stylesheet" th:href="@{/css/output.css}">
</head>
<body class="bg-black text-white min-h-screen flex flex-col">

<div th:replace="~{fragments/layout :: header}"></div>

<main class="flex-grow container mx-auto px-4 py-6 sm:py-8 max-w-2xl">
    <h2 class="text-2xl sm:text-3xl font-bold mb-6 sm:mb-8" th:text="${sess.venue}"></h2>

    <div class="bg-gray-800 p-4 sm:p-6 rounded-lg mb-8">
        <p class="mb-2 text-sm sm:text-base"><strong>Date:</strong>
            <span th:text="${#temporals.format(sess.startDate, 'dd-MM-yyyy')}"></span></p>
        <p class="mb-2 text-sm sm:text-base"><strong>Duration:</strong>
            <span th:text="${sess.durationHours + ' hours'}"></span></p>
        <p class="mb-4 text-sm sm:text-base"><strong>Anglers:</strong></p>
        <ul class="list-disc pl-6 mb-4 text-sm sm:text-base">
            <li th:each="angler : ${@sessionService.getAnglersForSession(sess.id)}" th:text="${angler.name}"></li>
        </ul>

        <form method="post" onsubmit="return confirm('Are you sure you want to delete this session?');"
              th:action="@{/sessions/{id}/delete(id=${sess.id})}">
            <button class="w-full sm:w-auto bg-red-600 hover:bg-red-700 text-white font-bold py-2 px-4 rounded"
                    type="submit">
                Delete Session
            </button>
        </form>
    </div>

    <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-3 mb-4">
        <h3 class="text-xl sm:text-2xl font-bold">Catches</h3>
        <a class="block sm:inline-block text-center bg-red-600 hover:bg-red-700 text-white font-bold py-2 px-4 rounded"
           th:href="@{/sessions/{id}/catches/new(id=${sess.id})}">
            Add Catch
        </a>
    </div>

    <div class="bg-gray-800 rounded-lg mb-8 divide-y divide-gray-700" th:if="${not #lists.isEmpty(catches)}">
        <a class="flex items-center gap-4 p-3 sm:p-4 hover:bg-gray-700"
           th:each="catchRecord : ${catches}"
           th:href="@{/sessions/{sessionId}/catches/{catchId}(sessionId=${sess.id},catchId=${catchRecord.id})}">
            <img alt="Catch thumbnail" class="w-14 h-14 sm:w-16 sm:h-16 object-cover rounded flex-shrink-0"
                 th:if="${catchRecord.photoUrl}"
                 th:src="${@s3Service.getPhotoUrl(catchRecord.photoUrl)}">
            <div class="w-14 h-14 sm:w-16 sm:h-16 bg-gray-700 rounded flex items-center justify-center text-xs text-gray-400 flex-shrink-0"
                 th:unless="${catchRecord.photoUrl}">No photo
            </div>
            <div class="flex-1 min-w-0">
                <p class="font-bold truncate" th:text="${catchRecord.angler.name}"></p>
                <p class="text-sm text-gray-400 truncate" th:text="${catchRecord.fishType}"></p>
            </div>
            <p class="font-bold flex-shrink-0" th:text="${catchRecord.weight + ' lb'}"></p>
        </a>
    </div>

    <p class="text-gray-400 mb-8" th:if="${#lists.isEmpty(catches)}">No catches logged yet.</p>

    <a class="text-red-400 hover:text-red-300" href="/dashboard">Back to Dashboard</a>
</main>

<div th:replace="~{fragments/layout :: footer}"></div>

</body>
</html>
