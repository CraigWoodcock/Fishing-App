<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <meta content="ie=edge" http-equiv="X-UA-Compatible">
    <title>Session - Fishing Session Tracker</title>
    <link rel="stylesheet" th:href="@{/css/output.css}">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="bg-black text-white">
<header class="text-center p-4 pb-0 mb-6 w-full">
    <h1 class="text-3xl font-bold mb-0.5">Fishing Session Tracker</h1>
</header>

<main class="container mx-auto px-4 py-8">
    <h1 class="text-3xl font-bold mb-8" th:text="${sess.venue}"></h1>
    <div class="bg-gray-800 p-6 rounded-lg mb-8">
        <p class="mb-2"><strong>Date:</strong> <span
                th:text="${#temporals.format(sess.startDate, 'dd-MM-yyyy')}"></span></p>
        <p class="mb-2"><strong>Duration:</strong> <span th:text="${sess.durationHours + ' hours'}"></span></p>
        <p class="mb-4"><strong>Anglers:</strong></p>
        <ul class="list-disc pl-6 mb-4">
            <li th:each="angler : ${@sessionService.getAnglersForSession(sess.id)}" th:text="${angler.name}"></li>
        </ul>

        <form method="post" onsubmit="return confirm('Are you sure you want to delete this session?');"
              th:action="@{/sessions/{id}/delete(id=${sess.id})}">
            <button class="bg-red-600 hover:bg-red-700 text-white font-bold py-2 px-4 rounded" type="submit">
                Delete Session
            </button>
        </form>
    </div>

    <div class="flex justify-between items-center mb-4">
        <h2 class="text-2xl font-bold">Catches</h2>
        <a class="bg-red-600 hover:bg-red-700 text-white font-bold py-2 px-4 rounded"
           th:href="@{/sessions/{id}/catches/new(id=${sess.id})}">Add Catch</a>
    </div>

    <div class="bg-gray-800 rounded-lg mb-8 divide-y divide-gray-700" th:if="${not #lists.isEmpty(catches)}">
        <a class="flex items-center gap-4 p-4 hover:bg-gray-700"
           th:each="catchRecord : ${catches}"
           th:href="@{/sessions/{sessionId}/catches/{catchId}(sessionId=${sess.id},catchId=${catchRecord.id})}">
            <img alt="Catch thumbnail" class="w-16 h-16 object-cover rounded"
                 th:if="${catchRecord.photoUrl}"
                 th:src="${@s3Service.getPhotoUrl(catchRecord.photoUrl)}">
            <div class="w-16 h-16 bg-gray-700 rounded flex items-center justify-center text-xs text-gray-400"
                 th:unless="${catchRecord.photoUrl}">No photo
            </div>
            <div class="flex-1">
                <p class="font-bold" th:text="${catchRecord.angler.name}"></p>
                <p class="text-sm text-gray-400" th:text="${catchRecord.fishType}"></p>
            </div>
            <p class="font-bold" th:text="${catchRecord.weight + ' lb'}"></p>
        </a>
    </div>

    <p class="text-gray-400 mb-8" th:if="${#lists.isEmpty(catches)}">No catches logged yet.</p>

    <a class="text-red-400 hover:text-red-300" href="/dashboard">Back to Dashboard</a>
</main>

<footer class="text-center p-4 h-20 bottom-0 bg-gray-800 w-full">
    <p>&copy; 2024 Fishing Session Tracker. All rights reserved.</p>
</footer>
</body>
</html>
